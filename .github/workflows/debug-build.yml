name: Release APK Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install zsh + Node.js + pnpm (web-ui build deps)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Verify signing keystore
        run: |
          if [ -f nekohub.keystore ]; then
            echo "✅ Using committed keystore ($(wc -c < nekohub.keystore) bytes)"
          else
            echo "❌ Keystore not found! Committed keystore should be in repo."
            exit 1
          fi

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rikkahub-ci",
              "storage_bucket": "rikkahub-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def456",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def457",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          NEKOHUB_KEYSTORE: ${{ github.workspace }}/nekohub.keystore
          NEKOHUB_STORE_PASSWORD: 'A%p5uLwSu3j#fBw'
          NEKOHUB_KEY_ALIAS: slightNeko
          NEKOHUB_KEY_PASSWORD: 'A%p5uLwSu3j#fBw'

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NekoHub-APK-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Get version
        id: version
        run: |
          VNAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$VNAME" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: "NekoHub v${{ steps.version.outputs.name }}"
          tag_name: "v${{ steps.version.outputs.name }}"
          prerelease: false
          generate_release_notes: true

      - name: Send build notification
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "NekoHub CI Build: ${{ job.status }} — v${{ steps.version.outputs.name }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: NekoHub CI
          body: |
            Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Status: ${{ job.status }}
            Version: v${{ steps.version.outputs.name }}
            APK: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.name }}
