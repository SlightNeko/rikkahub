name: Debug APK Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install zsh + Node.js + pnpm (web-ui build deps)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rikkahub-ci",
              "storage_bucket": "rikkahub-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def456",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def457",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
