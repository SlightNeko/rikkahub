name: Release APK Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install zsh + Node.js + pnpm (web-ui build deps)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore neko.keystore \
            -alias slightNeko \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 'A%p5uLwSu3j#fBw' \
            -keypass 'A%p5uLwSu3j#fBw' \
            -dname "CN=SlightNeko, OU=NekoHub, O=NekoHub, L=Unknown, ST=Unknown, C=CN"

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rikkahub-ci",
              "storage_bucket": "rikkahub-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def456",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:abc123def457",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyDummyCIBuildKey000000000000" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          NEKOHUB_KEYSTORE: ${{ github.workspace }}/neko.keystore
          NEKOHUB_STORE_PASSWORD: 'A%p5uLwSu3j#fBw'
          NEKOHUB_KEY_ALIAS: slightNeko
          NEKOHUB_KEY_PASSWORD: 'A%p5uLwSu3j#fBw'

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NekoHub-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Find APK
        id: apk
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: "NekoHub Release"
          tag_name: "build-${{ github.run_number }}"
          prerelease: false
          generate_release_notes: true
